root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/candle-service ./cmd/candle-service"
bin = "tmp/candle-service"

include_ext = ["go"]

include_dir = [
  ".",
  "../../packages/proto-defs/go/generated"
]

exclude_dir = [
  "tmp",
  "vendor",
  "node_modules"
]

delay = 200

[run]
cmd = "./tmp/candle-service"

[log]
time = true
