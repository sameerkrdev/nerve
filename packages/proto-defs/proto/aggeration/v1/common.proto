syntax = "proto3";

package aggeration.v1;

option go_package = "github.com/sameerkrdev/nerve/packages/proto-defs/proto/aggeration/v1";

enum Timeframe {
  TIMEFRAME_UNSPECIFIED = 0;
  TIMEFRAME_1M = 60; // 1 minute
  TIMEFRAME_3M = 180; // 3 minutes
  TIMEFRAME_5M = 300; // 5 minutes
  TIMEFRAME_15M = 900; // 15 minutes
  TIMEFRAME_30M = 1800; // 30 minutes
  TIMEFRAME_1H = 3600; // 1 hour
  TIMEFRAME_2H = 7200; // 2 hours
  TIMEFRAME_4H = 14400; // 4 hours
  TIMEFRAME_6H = 21600; // 6 hours
  TIMEFRAME_12H = 43200; // 12 hours
  TIMEFRAME_1D = 86400; // 1 day
  TIMEFRAME_1W = 604800; // 1 week
  TIMEFRAME_1MON = 2592000; // 1 month (30 days)
}

enum Source {
  SOURCE_UNSPECIFIED = 0;
  SOURCE_CLOSE = 1;
  SOURCE_OPEN = 2;
  SOURCE_HIGH = 3;
  SOURCE_LOW = 4;
  SOURCE_MIDDLE = 5;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_SYMBOL = 1;
  ERROR_CODE_INVALID_TIMEFRAME = 2;
  ERROR_CODE_RATE_LIMIT_EXCEEDED = 3;
  ERROR_CODE_UNAUTHORIZED = 4;
  ERROR_CODE_INTERNAL_ERROR = 5;
  ERROR_CODE_DATA_NOT_AVAILABLE = 6;
  ERROR_CODE_INVALID_PARAMETERS = 7;
}

message Error {
  ErrorCode code = 1;
  string message = 2;
  map<string, string> details = 3;
}

message DateRange {
  int64 from = 1;
  int64 to = 2;
}
