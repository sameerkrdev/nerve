syntax = "proto3";

package aggeration.v1;

import "aggeration/v1/common.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/sameerkrdev/nerve/packages/proto-defs/proto/aggeration/v1";

enum IndicatorCategory {
  INDICATOR_CATEGORY_UNSPECIFIED = 0;
  INDICATOR_CATEGORY_OVERLAY = 1; // plotted on price (EMA, VWAP)
  INDICATOR_CATEGORY_OSCILLATOR = 2; // separate pane (RSI, MACD)
  INDICATOR_CATEGORY_VOLUME = 3; // volume-based
}

message IndicatorParam {
  string key = 1;

  oneof value {
    int64 int_value = 2;
    double double_value = 3;
    string string_value = 4; // source = "close", "hlc3"
    bool bool_value = 5;
  }

  // SMA/EMA/WMA/VWMA: {source: Source, period:""}
  // RSI: {source: Source, period:""}
  // MACD: {source: Source, fast: "", slow:"", signal: "", }
}

message IndicatorRegistryItem {
  string indicator_id = 1; // "ema", "rsi", "macd"
  string name = 2;
  string description = 3;

  IndicatorCategory category = 4;
  bool multi_output = 5; // true for MACD, BB, etc.
}

message GetIndicatorRegistryResponse {
  repeated IndicatorRegistryItem indicators = 1;
}

message IndicatorInstance {
  string instance_id = 1; // unique per user/chart

  string indicator_id = 2;

  string symbol = 3;
  string timeframe = 4;

  repeated IndicatorParam params = 5;
}

message AddIndicatorRequest {
  IndicatorInstance instance = 1;
}

message UpdateIndicatorRequest {
  string instance_id = 1;
  repeated IndicatorParam params = 2;
}

message RemoveIndicatorRequest {
  string instance_id = 1;
}

message IndicatorOutput {
  string key = 1; // "value", "macd", "signal", "histogram"
  double value = 2;
}

message IndicatorValue {
  string instance_id = 1;

  string symbol = 2;
  string timeframe = 3;

  int64 timestamp = 4;

  repeated IndicatorOutput outputs = 5;
}

service IndicatorService {
  // Registry
  rpc GetIndicatorRegistry(google.protobuf.Empty) returns (GetIndicatorRegistryResponse);

  // Basic indicator lifecycle
  rpc AddIndicator(AddIndicatorRequest) returns (google.protobuf.Empty);

  rpc UpdateIndicator(UpdateIndicatorRequest) returns (google.protobuf.Empty);

  rpc RemoveIndicator(RemoveIndicatorRequest) returns (google.protobuf.Empty);

  // Custom graph indicator
  // rpc AddCustomIndicator(AddCustomIndicatorRequest) returns (google.protobuf.Empty);

  // Realtime stream
  // rpc SubscribeIndicatorUpdates(SubscribeIndicatorUpdatesRequest) returns (stream IndicatorValue);
}
